<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for professional look -->
    <radialGradient id="gearGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#8B5FBF"/>
      <stop offset="100%" stop-color="#6A4C8C"/>
    </radialGradient>
    
    <radialGradient id="centerGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#FF6B42"/>
      <stop offset="100%" stop-color="#E5541A"/>
    </radialGradient>
    
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A9EFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#6BCF7F" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.8"/>
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="2"/>
  
  <!-- Main gear (representing configuration engine) -->
  <g transform="translate(60,60)" filter="url(#shadow)">
    <!-- Gear teeth -->
    <g fill="url(#gearGradient)">
      <rect x="-3" y="-25" width="6" height="8" rx="1"/>
      <rect x="-3" y="17" width="6" height="8" rx="1"/>
      <rect x="-25" y="-3" width="8" height="6" ry="1"/>
      <rect x="17" y="-3" width="8" height="6" ry="1"/>
      
      <!-- Diagonal teeth -->
      <rect x="-18" y="-18" width="6" height="8" rx="1" transform="rotate(45)"/>
      <rect x="12" y="-18" width="6" height="8" rx="1" transform="rotate(45)"/>
      <rect x="-18" y="10" width="6" height="8" rx="1" transform="rotate(45)"/>
      <rect x="12" y="10" width="6" height="8" rx="1" transform="rotate(45)"/>
    </g>
    
    <!-- Main gear body -->
    <circle r="20" fill="url(#gearGradient)"/>
    
    <!-- Center hub -->
    <circle r="8" fill="url(#centerGradient)"/>
  </g>
  
  <!-- Configuration streams flowing into gear -->
  <!-- YAML stream -->
  <path d="M15,30 Q35,45 45,55" fill="none" stroke="url(#flowGradient)" stroke-width="3" opacity="0.8"/>
  <circle cx="15" cy="30" r="3" fill="#4A9EFF"/>
  <text x="8" y="25" font-family="'Courier New', monospace" font-size="8" font-weight="bold" fill="#4A9EFF">yml</text>
  
  <!-- JSON stream -->
  <path d="M15,90 Q35,75 45,65" fill="none" stroke="url(#flowGradient)" stroke-width="3" opacity="0.8"/>
  <circle cx="15" cy="90" r="3" fill="#6BCF7F"/>
  <text x="6" y="105" font-family="'Courier New', monospace" font-size="8" font-weight="bold" fill="#6BCF7F">json</text>
  
  <!-- TOML stream -->
  <path d="M105,30 Q85,45 75,55" fill="none" stroke="url(#flowGradient)" stroke-width="3" opacity="0.8"/>
  <circle cx="105" cy="30" r="3" fill="#FFD700"/>
  <text x="98" y="25" font-family="'Courier New', monospace" font-size="8" font-weight="bold" fill="#FFD700">toml</text>
  
  <!-- Output stream -->
  <path d="M75,65 Q95,75 105,90" fill="none" stroke="#FF6B42" stroke-width="4" opacity="0.9"/>
  <polygon points="103,88 107,90 103,92" fill="#FF6B42"/>
  
  <!-- Jinja template symbols -->
  <text x="35" y="15" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#8B5FBF" filter="url(#glow)">{{</text>
  <text x="70" y="15" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#8B5FBF" filter="url(#glow)">}}</text>
  
  <!-- Merge/Injection symbol -->
  <text x="52" y="110" font-family="'Arial', sans-serif" font-size="12" font-weight="bold" fill="#666">⚙️→📄</text>
</svg>
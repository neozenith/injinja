<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for professional look -->
    <radialGradient id="syringeGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#4A9EFF"/>
      <stop offset="100%" stop-color="#1E7CE8"/>
    </radialGradient>
    
    <linearGradient id="needleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="50%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    
    <radialGradient id="liquidGradient" cx="0.3" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#FF6B42"/>
      <stop offset="100%" stop-color="#E5541A"/>
    </radialGradient>
    
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow effect for Jinja symbols -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="2"/>
  
  <!-- Syringe body -->
  <rect x="25" y="45" width="50" height="20" rx="3" ry="3" fill="url(#syringeGradient)" filter="url(#shadow)"/>
  
  <!-- Syringe plunger -->
  <rect x="20" y="48" width="8" height="14" rx="2" ry="2" fill="#606060"/>
  <circle cx="24" cy="55" r="3" fill="#808080"/>
  
  <!-- Needle -->
  <rect x="75" y="52" width="20" height="6" rx="3" ry="3" fill="url(#needleGradient)" filter="url(#shadow)"/>
  
  <!-- Needle tip -->
  <polygon points="95,55 100,55" fill="#808080"/>
  
  <!-- Injectable liquid -->
  <rect x="30" y="49" width="35" height="12" rx="2" ry="2" fill="url(#liquidGradient)" opacity="0.8"/>
  
  <!-- Measurement marks -->
  <line x1="30" y1="47" x2="30" y2="43" stroke="#333" stroke-width="1"/>
  <line x1="40" y1="47" x2="40" y2="43" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="47" x2="50" y2="43" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="47" x2="60" y2="43" stroke="#333" stroke-width="1"/>
  
  <!-- Jinja template symbols -->
  <text x="35" y="35" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#FFD700" filter="url(#glow)">{{</text>
  <text x="70" y="35" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#FFD700" filter="url(#glow)">}}</text>
  
  <!-- Configuration symbols around syringe -->
  <text x="25" y="80" font-family="'Courier New', monospace" font-size="8" fill="#666">yml</text>
  <text x="45" y="80" font-family="'Courier New', monospace" font-size="8" fill="#666">json</text>
  <text x="68" y="80" font-family="'Courier New', monospace" font-size="8" fill="#666">toml</text>
  
  <!-- Injection flow arrows -->
  <path d="M15,25 Q30,15 45,25" fill="none" stroke="#4A9EFF" stroke-width="2" opacity="0.6"/>
  <polygon points="43,23 47,25 43,27" fill="#4A9EFF" opacity="0.6"/>
  
  <path d="M105,25 Q90,15 75,25" fill="none" stroke="#4A9EFF" stroke-width="2" opacity="0.6"/>
  <polygon points="77,23 73,25 77,27" fill="#4A9EFF" opacity="0.6"/>
</svg>
<!-- Injinja Logo Option 2: Wise Configuration Owl -->
<svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="owlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#805AD5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#553C9A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9F7AEA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#805AD5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="configGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#48BB78;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#48BB78;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Configuration Data Streams -->
  <circle cx="50" cy="40" r="15" fill="url(#configGlow)"/>
  <circle cx="150" cy="35" r="12" fill="url(#configGlow)"/>
  <circle cx="30" cy="70" r="10" fill="url(#configGlow)"/>
  <circle cx="170" cy="65" r="10" fill="url(#configGlow)"/>
  
  <!-- Data Flow Lines -->
  <path d="M50 40 Q75 35 85 45" stroke="#48BB78" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M150 35 Q125 40 115 45" stroke="#48BB78" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M30 70 Q60 70 80 65" stroke="#48BB78" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M170 65 Q140 70 120 65" stroke="#48BB78" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.6"/>
  
  <!-- Owl Body -->
  <ellipse cx="100" cy="65" rx="25" ry="30" fill="url(#owlGradient)"/>
  
  <!-- Owl Wings -->
  <ellipse cx="78" cy="58" rx="12" ry="18" fill="url(#wingGradient)" transform="rotate(-15 78 58)"/>
  <ellipse cx="122" cy="58" rx="12" ry="18" fill="url(#wingGradient)" transform="rotate(15 122 58)"/>
  
  <!-- Wing Details -->
  <ellipse cx="78" cy="58" rx="8" ry="12" fill="#B794F6" opacity="0.7" transform="rotate(-15 78 58)"/>
  <ellipse cx="122" cy="58" rx="8" ry="12" fill="#B794F6" opacity="0.7" transform="rotate(15 122 58)"/>
  
  <!-- Owl Head -->
  <circle cx="100" cy="35" r="20" fill="url(#owlGradient)"/>
  
  <!-- Owl Eyes -->
  <circle cx="92" cy="32" r="7" fill="#F7FAFC"/>
  <circle cx="108" cy="32" r="7" fill="#F7FAFC"/>
  <circle cx="92" cy="32" r="5" fill="#2D3748"/>
  <circle cx="108" cy="32" r="5" fill="#2D3748"/>
  <circle cx="93" cy="31" r="2" fill="#F7FAFC"/>
  <circle cx="109" cy="31" r="2" fill="#F7FAFC"/>
  
  <!-- Owl Beak -->
  <path d="M100 38 L95 42 L105 42 Z" fill="#F6AD55"/>
  
  <!-- Configuration Symbol on Chest -->
  <rect x="92" y="58" width="16" height="12" rx="3" fill="#F7FAFC" opacity="0.9"/>
  <text x="100" y="66" text-anchor="middle" fill="#553C9A" font-family="monospace" font-size="8" font-weight="bold">cfg</text>
  
  <!-- Perch/Branch -->
  <rect x="70" y="88" width="60" height="4" rx="2" fill="#8B4513"/>
  <ellipse cx="75" cy="90" rx="3" ry="2" fill="#A0522D"/>
  <ellipse cx="125" cy="90" rx="3" ry="2" fill="#A0522D"/>
  
  <!-- Owl Feet -->
  <path d="M88 88 L85 93 M88 88 L91 93 M88 88 L88 93" stroke="#F6AD55" stroke-width="2" stroke-linecap="round"/>
  <path d="M112 88 L109 93 M112 88 L115 93 M112 88 L112 93" stroke="#F6AD55" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Project Name -->
  <text x="100" y="110" text-anchor="middle" fill="#553C9A" font-family="sans-serif" font-weight="bold" font-size="14">injinja</text>
</svg>
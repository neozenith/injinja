<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Badge-optimized Ginger Ninja Cat - High contrast, minimal details -->
  <defs>
    <linearGradient id="gingerSimple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5541A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cat head (main element for badge) -->
  <circle cx="16" cy="16" r="14" fill="url(#gingerSimple)" stroke="#D4541A" stroke-width="1"/>
  
  <!-- Cat ears -->
  <polygon points="8,8 6,2 12,5" fill="url(#gingerSimple)"/>
  <polygon points="24,8 26,2 20,5" fill="url(#gingerSimple)"/>
  
  <!-- Ninja mask (simplified) -->
  <ellipse cx="16" cy="17" rx="12" ry="5" fill="#2C3E50"/>
  
  <!-- Cat eyes (bright and visible) -->
  <circle cx="12" cy="14" r="2.5" fill="#FFE135"/>
  <circle cx="20" cy="14" r="2.5" fill="#FFE135"/>
  <circle cx="12" cy="14" r="1.5" fill="#2C3E50"/>
  <circle cx="20" cy="14" r="1.5" fill="#2C3E50"/>
  
  <!-- Simplified whiskers -->
  <line x1="4" y1="16" x2="8" y2="15" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="24" y1="15" x2="28" y2="16" stroke="#2C3E50" stroke-width="1.5"/>
  
  <!-- Jinja symbol (minimal) -->
  <text x="16" y="26" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFE135" font-weight="bold">{{}}</text>
</svg>